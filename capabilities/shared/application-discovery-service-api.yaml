naftiko: "1.0.0-alpha1"

info:
  label: Amazon Application Discovery Service API
  description: Shared capability definition for the AWS Application Discovery Service API, covering agents, applications, configurations, exports, imports, and tags.
  tags:
    - Amazon Application Discovery Service
    - Migration
    - Discovery
    - Infrastructure
    - AWS
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: ads
      baseUri: https://discovery.us-east-1.amazonaws.com
      description: AWS Application Discovery Service for collecting on-premises server inventory and usage data.
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: agents
          path: /v1/describeAgents
          description: List and manage discovery agents and collectors.
          operations:
            - name: describe-agents
              method: POST
              description: Lists agents or collectors with status and configuration.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: agents-delete
          path: /v1/batchDeleteAgents
          description: Delete discovery agents.
          operations:
            - name: batch-delete-agents
              method: POST
              description: Deletes one or more agents or collectors by ID.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: agents-start-collection
          path: /v1/startDataCollectionByAgentIds
          description: Start data collection on agents.
          operations:
            - name: start-data-collection
              method: POST
              description: Instructs specified agents to start collecting data.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: agents-stop-collection
          path: /v1/stopDataCollectionByAgentIds
          description: Stop data collection on agents.
          operations:
            - name: stop-data-collection
              method: POST
              description: Instructs specified agents to stop collecting data.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: applications-create
          path: /v1/createApplication
          description: Create application groupings.
          operations:
            - name: create-application
              method: POST
              description: Creates an application with the given name and description.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: applications-delete
          path: /v1/deleteApplications
          description: Delete application groupings.
          operations:
            - name: delete-applications
              method: POST
              description: Deletes a list of applications and their associations.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: applications-update
          path: /v1/updateApplication
          description: Update application metadata.
          operations:
            - name: update-application
              method: POST
              description: Updates metadata about an application.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: configurations-describe
          path: /v1/describeConfigurations
          description: Get details about discovered configuration items.
          operations:
            - name: describe-configurations
              method: POST
              description: Retrieves attributes for a list of configuration item IDs.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: configurations-list
          path: /v1/listConfigurations
          description: List discovered configuration items by type.
          operations:
            - name: list-configurations
              method: POST
              description: Retrieves a list of configuration items by type.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: discovery-summary
          path: /v1/getDiscoverySummary
          description: Get a summary of discovered assets.
          operations:
            - name: get-discovery-summary
              method: POST
              description: Retrieves a short summary of discovered assets.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: server-neighbors
          path: /v1/listServerNeighbors
          description: Get network neighbors of a server.
          operations:
            - name: list-server-neighbors
              method: POST
              description: Retrieves servers one network hop away from a specified server.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: exports-start
          path: /v1/startExportTask
          description: Export discovered data to S3.
          operations:
            - name: start-export-task
              method: POST
              description: Begins the export of discovered data to an S3 bucket.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: exports-describe
          path: /v1/describeExportTasks
          description: Check status of export tasks.
          operations:
            - name: describe-export-tasks
              method: POST
              description: Retrieve status of one or more export tasks.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: imports-start
          path: /v1/startImportTask
          description: Import server data from S3.
          operations:
            - name: start-import-task
              method: POST
              description: Starts an import task for on-premises server data from S3.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: imports-describe
          path: /v1/describeImportTasks
          description: Check status of import tasks.
          operations:
            - name: describe-import-tasks
              method: POST
              description: Returns import tasks with status information.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ads-rest
      resources:
        - path: /v1/agents
          name: agents
          description: Discovery agents
          operations:
            - method: GET
              name: describe-agents
              description: List all discovery agents
              call: "ads.describe-agents"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/configurations
          name: configurations
          description: Discovered configuration items
          operations:
            - method: POST
              name: list-configurations
              description: List discovered servers, processes, connections, and applications
              call: "ads.list-configurations"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/summary
          name: discovery-summary
          description: Discovery summary stats
          operations:
            - method: GET
              name: get-discovery-summary
              description: Get count of discovered servers, agents, and applications
              call: "ads.get-discovery-summary"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ads-mcp
      transport: http
      tools:
        - name: describe-agents
          description: List all AWS Application Discovery Service agents and their health status.
          hints:
            readOnly: true
            openWorld: true
          call: "ads.describe-agents"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-configurations
          description: List discovered configuration items (servers, processes, connections, applications).
          hints:
            readOnly: true
            openWorld: true
          call: "ads.list-configurations"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-configurations
          description: Get detailed attributes for specific discovered configuration items.
          hints:
            readOnly: true
            openWorld: true
          call: "ads.describe-configurations"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-discovery-summary
          description: Get a summary count of all discovered servers, applications, and agents.
          hints:
            readOnly: true
            openWorld: true
          call: "ads.get-discovery-summary"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-server-neighbors
          description: Find servers that communicate with a specific server to map dependencies.
          hints:
            readOnly: true
            openWorld: true
          call: "ads.list-server-neighbors"
          outputParameters:
            - type: object
              mapping: "$."

        - name: start-export-task
          description: Export discovered server data to Amazon S3 for analysis.
          hints:
            readOnly: false
            openWorld: false
          call: "ads.start-export-task"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-export-tasks
          description: Check the status of discovery data export tasks.
          hints:
            readOnly: true
            openWorld: true
          call: "ads.describe-export-tasks"
          outputParameters:
            - type: object
              mapping: "$."

        - name: start-import-task
          description: Import on-premises server inventory from a CSV file in Amazon S3.
          hints:
            readOnly: false
            openWorld: false
          call: "ads.start-import-task"
          outputParameters:
            - type: object
              mapping: "$."
