              schema:
                $ref: '#/components/schemas/StartDataCollectionByAgentIdsResponse'
              examples:
                StartDataCollectionByAgentIds200Example:
                  summary: Default startDataCollectionByAgentIds 200 response
                  x-microcks-default: true
                  value:
                    agentsConfigurationStatus:
