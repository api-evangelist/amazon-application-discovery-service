components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication
  schemas:
    DescribeAgentsRequest:
      type: object
      properties:
        agentIds:
          type: array
          description: The agent or the collector IDs for which you want information. If you specify no IDs, the system returns information about all agents/collectors associated with your AWS user account.
          items:
            type: string
          example:
            - d-agent-500123
        filters:
          type: array
          description: You can filter the request using various logical operators and a key-value format.
          items:
            $ref: '#/components/schemas/Filter'
        maxResults:
          type: integer
          description: The total number of agents/collectors to return in a single page of output.
          minimum: 0
          maximum: 900
          example: 10
        nextToken:
          type: string
          description: Token to retrieve the next set of results.
          example: ''
    DescribeAgentsResponse:
      type: object
      properties:
        agentsInfo:
          type: array
          description: Lists agents or the collectors with status and configuration.
          items:
            $ref: '#/components/schemas/AgentInfo'
        nextToken:
          type: string
          description: Token to retrieve the next set of results.
          example: ''
    AgentInfo:
      type: object
      properties:
        agentId:
          type: string
          description: The agent or collector ID.
          example: d-agent-500123
        hostName:
          type: string
          description: The name of the host where the agent or collector resides.
          example: server-01.example.com
        agentNetworkInfoList:
          type: array
          description: Network details about the host where the agent or collector resides.
          items:
            $ref: '#/components/schemas/AgentNetworkInfo'
        connectorId:
          type: string
          description: The ID of the connector.
          example: ''
        version:
          type: string
          description: The agent or collector version.
          example: 2.0.1
        health:
          type: string
          description: The health of the agent or collector.
          enum:
            - HEALTHY
            - UNHEALTHY
            - RUNNING
            - UNKNOWN
            - BLACKLISTED
            - SHUTDOWN
          example: HEALTHY
        lastHealthPingTime:
          type: string
          description: Time since agent or collector health was reported.
          example: '2026-04-19T10:00:00Z'
        collectionStatus:
          type: string
          description: Status of the collection process for the agent or collector.
          example: START_SCHEDULED
        agentType:
          type: string
          description: Type of agent.
          example: AWS_DISCOVERY_AGENT
        registeredTime:
          type: string
          description: Agent's first registration timestamp in UTC.
          example: '2026-01-01T00:00:00Z'
    AgentNetworkInfo:
      type: object
      properties:
        ipAddress:
          type: string
          description: The IP address for the host where the agent or collector resides.
          example: 10.0.0.10
        macAddress:
          type: string
          description: The MAC address for the host where the agent or collector resides.
          example: aa:bb:cc:dd:ee:ff
    BatchDeleteAgentsRequest:
      type: object
      required:
        - deleteAgents
      properties:
        deleteAgents:
          type: array
          description: The list of agents to delete.
          items:
            $ref: '#/components/schemas/DeleteAgent'
    DeleteAgent:
      type: object
      required:
        - agentId
      properties:
        agentId:
          type: string
          description: The ID of the agent you want to delete.
          example: d-agent-500123
        force:
          type: boolean
          description: You can use the force parameter to delete agents that do not respond to API actions.
          example: false
    BatchDeleteAgentsResponse:
      type: object
      properties:
        errors:
          type: array
          description: A list of agent IDs that failed to delete along with the cause of the error.
          items:
            $ref: '#/components/schemas/BatchDeleteAgentError'
    BatchDeleteAgentError:
      type: object
      properties:
        agentId:
          type: string
          description: The ID of the agent that failed to delete.
          example: d-agent-500123
        errorCode:
          type: string
          description: The type of error that occurred.
          example: NOT_FOUND
        errorMessage:
          type: string
          description: The text of the error message.
          example: Agent not found
    StartDataCollectionByAgentIdsRequest:
      type: object
      required:
        - agentIds
      properties:
        agentIds:
          type: array
          description: The IDs of the agents from which to start collecting data. If you send a request to an agent that you do not have permission to contact, according to your AWS account's permission settings, the agent is not included in the list of agents that are started.
          items:
            type: string
          example:
            - d-agent-500123
    StartDataCollectionByAgentIdsResponse:
      type: object
      properties:
        agentsConfigurationStatus:
          type: array
          description: Information about agents that were instructed to start collecting data. Information includes the agent ID, a description of the operation performed, and whether the agent configuration was updated successfully.
          items:
            $ref: '#/components/schemas/AgentConfigurationStatus'
    AgentConfigurationStatus:
      type: object
      properties:
        agentId:
          type: string
          description: The agent ID.
          example: d-agent-500123
        operationSucceeded:
          type: boolean
          description: Information about the status of the StartDataCollection and StopDataCollection operations.
          example: true
        description:
          type: string
          description: A description of the operation performed.
          example: Started data collection
    StopDataCollectionByAgentIdsRequest:
      type: object
      required:
        - agentIds
      properties:
        agentIds:
          type: array
          description: The IDs of the agents from which to stop collecting data.
          items:
            type: string
          example:
            - d-agent-500123
    StopDataCollectionByAgentIdsResponse:
      type: object
      properties:
        agentsConfigurationStatus:
          type: array
          description: Information about the agents that were instructed to stop collecting data.
          items:
            $ref: '#/components/schemas/AgentConfigurationStatus'
    CreateApplicationRequest:
