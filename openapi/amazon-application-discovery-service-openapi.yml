openapi: 3.1.0
info:
  title: Amazon Application Discovery Service API
  description: >-
    AWS Application Discovery Service helps you plan your migration to AWS by
    collecting usage and configuration data about your on-premises servers,
    network infrastructure, and storage. Application Discovery Service enables
    you to understand the configuration, usage, and behavior of your servers and
    to develop a migration plan.
  version: '2015-11-01'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  x-generated-from: documentation
  x-last-validated: '2026-04-19'
servers:
  - url: https://discovery.us-east-1.amazonaws.com
    description: AWS Application Discovery Service endpoint
security:
  - sigv4: []
tags:
  - name: Agents
    description: Operations for managing discovery agents and collectors
  - name: Applications
    description: Operations for managing application groupings
  - name: Configurations
    description: Operations for querying discovered configuration items
  - name: Exports
    description: Operations for exporting discovered data
  - name: Imports
    description: Operations for importing server data
  - name: Tags
    description: Operations for managing configuration item tags
paths:
  /v1/describeAgents:
    post:
      operationId: describeAgents
      summary: Amazon Application Discovery Service Describe Agents
      description: Lists agents or collectors as specified by ID or all agents/collectors associated with your user, if you did not specify an ID. The output includes information about each agent/collector, including the agent/collector ID, IP address, media access control (MAC) address, agent/collector version, and so on.
      tags:
        - Agents
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeAgentsRequest'
            examples:
              DescribeAgentsRequestExample:
                summary: Default describeAgents request
                x-microcks-default: true
                value:
                  maxResults: 10
      responses:
        '200':
          description: Agents described successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeAgentsResponse'
              examples:
                DescribeAgents200Example:
                  summary: Default describeAgents 200 response
                  x-microcks-default: true
                  value:
                    agentsInfo:
                      - agentId: d-agent-500123
                        hostName: server-01.example.com
                        agentNetworkInfoList:
                          - ipAddress: 10.0.0.10
                            macAddress: aa:bb:cc:dd:ee:ff
                        connectorId: ''
                        version: '2.0.1'
                        health: HEALTHY
                        lastHealthPingTime: '2026-04-19T10:00:00Z'
                        collectionStatus: START_SCHEDULED
                        agentType: AWS_DISCOVERY_AGENT
                        registeredTime: '2026-01-01T00:00:00Z'
                    nextToken: ''
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/batchDeleteAgents:
    post:
      operationId: batchDeleteAgents
      summary: Amazon Application Discovery Service Batch Delete Agents
      description: Deletes one or more agents or collectors as specified by ID. Deleting an agent or collector does not delete the previously discovered data. To delete the data collected, use StartBatchDeleteConfigurationTask.
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteAgentsRequest'
            examples:
              BatchDeleteAgentsRequestExample:
                summary: Default batchDeleteAgents request
                x-microcks-default: true
                value:
                  deleteAgents:
                    - agentId: d-agent-500123
                      force: false
      responses:
        '200':
          description: Agents deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteAgentsResponse'
              examples:
                BatchDeleteAgents200Example:
                  summary: Default batchDeleteAgents 200 response
                  x-microcks-default: true
                  value:
                    errors: []
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/startDataCollectionByAgentIds:
    post:
      operationId: startDataCollectionByAgentIds
